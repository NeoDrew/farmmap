services:
  # FastAPI backend
  - type: web
    name: farmmap-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farmmap-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: farmmap-redis
          type: redis
          property: connectionString
      - key: CH_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.0"
    healthCheckPath: /health

  # Frontend static site
  - type: web
    name: farmmap-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars: []
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Redis
  - type: redis
    name: farmmap-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # PostgreSQL — note: Render's managed Postgres does NOT have PostGIS by default.
  # We handle this by creating geometry columns via plain lat/lng floats and
  # computing spatial ops in application code, with PostGIS used only when available.
  - name: farmmap-db
    plan: free
    databaseName: farmmap
    user: farmmap
